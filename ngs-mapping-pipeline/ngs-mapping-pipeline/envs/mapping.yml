cat > envs/mapping.yml << 'EOF'
name: mapping
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - bwa-mem2=2.2.1
  - hisat2=2.2.1
  - samtools=1.18
  - htslib=1.18
EOF

cat > envs/qc.yml << 'EOF'
name: qc
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - fastqc=0.12.1
  - multiqc=1.15
  - picard=3.1.0
  - mosdepth=0.3.3
EOF
